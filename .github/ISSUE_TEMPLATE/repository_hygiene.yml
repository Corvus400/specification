name: Repository hygiene report
description: Report non-sensitive public repository hygiene issues.
title: "repo: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Use this form only for public, non-sensitive repository hygiene issues.
        Do not include secrets, access tokens, private URLs, local machine paths,
        personal email addresses, private personal information, or vulnerability details.
        Security issues must be reported through the private Security Advisory link.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the public repository hygiene issue.
      placeholder: A public-facing document or repository setting appears inconsistent...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Public documentation
        - Repository metadata
        - Specification documents
        - OpenAPI contract
        - Dependency update configuration
        - GitHub Actions configuration
        - Other public repository hygiene
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Public evidence
      description: Add public URLs or screenshots only if they are safe to share publicly.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include secrets, credentials, access tokens, private URLs, local machine paths, personal email addresses, private personal information, or vulnerability details.
          required: true
